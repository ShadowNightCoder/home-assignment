<main class="login-container">
  
  <div class="login-card vulnerable">
    <div class="card-header">
      <h2>Legacy System</h2>
      <span class="badge danger">v1.0</span>
    </div>
    <form>
      <div class="input-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="vulnerableUser.username" name="vUser" placeholder="Enter username">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="vulnerableUser.password" name="vPass" placeholder="Enter password">
      </div>
      <button type="button" class="btn btn-danger" (click)="testVulnerable()">Login</button>
      
      <p *ngIf="vIsSuccess !== null" [ngClass]="vIsSuccess ? 'msg-ok' : 'msg-err'">
        {{ vMessage }}
      </p>
    </form>
  </div>

  <div class="login-card secure">
    <div class="card-header">
      <h2>Secure System</h2>
      <span class="badge success">v2.0</span>
    </div>
    <form>
      <div class="input-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="secureUser.username" name="sUser" placeholder="Enter username">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="secureUser.password" name="sPass" placeholder="Enter password">
      </div>
      <button type="button" class="btn btn-primary" (click)="testSecure()">Login</button>

      <p *ngIf="sIsSuccess !== null" [ngClass]="sIsSuccess ? 'msg-ok' : 'msg-err'">
        {{ sMessage }}
      </p>
    </form>
  </div>

</main>
